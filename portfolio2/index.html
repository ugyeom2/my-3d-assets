<div style="width:100%; max-width:900px; margin:0 auto;">
  <div style="display:flex; justify-content:flex-end; gap:8px; margin-bottom:8px;">
    <button id="btn-3d-building" style="padding:6px 12px; border-radius:999px; border:1px solid #333; background:#333; color:#fff; font-size:12px; cursor:pointer;">
      건물 보기
    </button>
    <button id="btn-3d-real" style="padding:6px 12px; border-radius:999px; border:1px solid #ccc; background:#fff; color:#333; font-size:12px; cursor:pointer;">
      실물 보기
    </button>
  </div>
  <div id="product-3d-view" style="width:100%; height:min(700px, 85vh); min-height:280px; background:#f4f4f4; border-radius:12px; overflow:hidden;">
    <div id="loading-text" style="text-align:center; padding-top:200px; font-size:13px; color:#555;">도시 모델 불러오는 중...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

<script>
(function() {
  const container = document.getElementById('product-3d-view');
  if (!container) return;

  // 1. Scene & Camera 설정
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf4f4f4);
  const updateCameraFov = function() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    const aspect = w / h;
    // 좁은 모바일: FOV 확대해 더 넓은 영역 표시 (잘림 방지)
    camera.fov = (w < 480 || aspect < 0.65) ? 55 : 45;
    camera.aspect = aspect;
    camera.updateProjectionMatrix();
  };
  // Near 값을 너무 작게(0.1 미만) 잡지 않는 것이 Z-fighting 방지에 유리합니다.
  const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.5, 1000);
  camera.position.set(5, 5, 5);
  updateCameraFov();

  // 2. Renderer 설정
  const renderer = new THREE.WebGLRenderer({ 
    antialias: true, 
    logarithmicDepthBuffer: true,
    precision: 'highp' // 고정밀도 계산 활성화
  });
  renderer.setPixelRatio(window.devicePixelRatio); // 선명도 향상
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  // 최대 이방성(Anisotropy) 값 확인
  const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();

  // 3. 조명 추가 (도시가 잘 보이게)
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(10, 15, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 1;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -20;
  dirLight.shadow.camera.right = 20;
  dirLight.shadow.camera.top = 20;
  dirLight.shadow.camera.bottom = -20;
  scene.add(dirLight);

  // 3-1. 바닥 Plane (그림자 받는 용도)
  const groundGeo = new THREE.PlaneGeometry(100, 100);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0xe0e0e0,
    roughness: 0.9,
    metalness: 0.0
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -5; // 기본값: 화면 아래쪽에 멀리 (이후 모델 높이에 맞춰 재조정)
  ground.receiveShadow = true;
  scene.add(ground);

  // 4. 로더 만들기 (여기서 에러가 났던 부분을 수정한 순서입니다)
  const dracoLoader = new THREE.DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');

  const loader = new THREE.GLTFLoader(); // 로더를 먼저 만들고
  loader.setCrossOrigin('anonymous');    // 설정을 입힌 뒤
  loader.setDRACOLoader(dracoLoader);    // 연결합니다.

  // 5. GitHub Raw 주소 (모드별)
  const MODEL_URLS = {
    building: 'https://raw.githubusercontent.com/ugyeom2/my-3d-assets/main/portfolio2/building.glb', // 건물 모델
    real:     'https://raw.githubusercontent.com/ugyeom2/my-3d-assets/main/portfolio1/draw.glb'      // 실물 모델 (URL만 바꿔 끼우면 됨)
  };

  let currentModel = null;

  function setActiveButton(mode) {
    const btnBuilding = document.getElementById('btn-3d-building');
    const btnReal = document.getElementById('btn-3d-real');

    if (!btnBuilding || !btnReal) return;

    if (mode === 'building') {
      btnBuilding.style.background = '#333';
      btnBuilding.style.color = '#fff';
      btnBuilding.style.borderColor = '#333';

      btnReal.style.background = '#fff';
      btnReal.style.color = '#333';
      btnReal.style.borderColor = '#ccc';
    } else {
      btnReal.style.background = '#333';
      btnReal.style.color = '#fff';
      btnReal.style.borderColor = '#333';

      btnBuilding.style.background = '#fff';
      btnBuilding.style.color = '#333';
      btnBuilding.style.borderColor = '#ccc';
    }
  }

  function loadModel(mode) {
    const url = MODEL_URLS[mode];
    if (!url) return;

    const loadingText = document.getElementById('loading-text');
    if (loadingText) {
      loadingText.style.display = 'block';
      loadingText.innerText = mode === 'building' ? '도시 모델 불러오는 중...' : '실물 모델 불러오는 중...';
    }

    // 이전 모델 제거
    if (currentModel) {
      scene.remove(currentModel);
      currentModel = null;
    }

    // 모드별 바닥/그림자 설정
    if (mode === 'building') {
      // 건물 모드: 바닥과 그림자 사용
      ground.visible = true;
      renderer.shadowMap.enabled = true;
      dirLight.castShadow = true;
    } else {
      // 실물 모드: 바닥과 그림자 모두 끄기
      ground.visible = false;
      renderer.shadowMap.enabled = false;
      dirLight.castShadow = false;
    }

    loader.load(
      url,
      function (gltf) {
        // 모델 중앙 정렬
        const box = new THREE.Box3().setFromObject(gltf.scene);
        const center = box.getCenter(new THREE.Vector3());
        gltf.scene.position.sub(center);

        // 모델의 바닥 높이에 맞춰 ground 재조정
        const boxAfterCenter = new THREE.Box3().setFromObject(gltf.scene);
        const minY = boxAfterCenter.min.y;
        ground.position.y = minY - 0.01; // 바닥 바로 아래에 살짝 깔기

        // 뷰 모드별로 카메라 시작 위치 다르게 세팅
        const size = boxAfterCenter.getSize(new THREE.Vector3());
        const maxSize = Math.max(size.x, size.y, size.z);
        let baseDistance = maxSize * 1.8; // 모델 크기에 비례한 기본 거리

        // 좁은 모바일(iPhone SE3 등)에서는 확대되어 잘리므로 거리 보정
        const w = container.clientWidth;
        const h = container.clientHeight;
        const aspect = w / h;
        if (w < 480 || aspect < 0.65) {
          baseDistance *= 1.5; // 좁은 화면: 50% 더 멀리서 시작
        } else if (w < 768 || aspect < 0.85) {
          baseDistance *= 1.2; // 중간 화면: 20% 더 멀리
        }

        if (mode === 'building') {
          // 건물: 멀리서 전체가 화면에 들어오도록
          const d = baseDistance * 1.4;
          camera.position.set(d, d * 0.8, d);
        } else {
          // 실물: 가까이서 제품을 보는 느낌
          const d = baseDistance * 0.7;
          camera.position.set(d, d * 0.8, d);
        }

        camera.lookAt(0, 0, 0);

        // 메시에 그림자 + z-fighting 완화 설정
        gltf.scene.traverse(function (child) {
          if (child.isMesh) {
            // 모드별로 그림자 설정
            if (mode === 'building') {
              // 건물 모드: 바닥에 그림자 떨어지도록
              child.castShadow = true;
              child.receiveShadow = true;
            } else {
              // 실물 모드: 그림자 없이 공중에 떠 있는 느낌
              child.castShadow = false;
              child.receiveShadow = false;
            }
            
            if (child.material) {
              // Z-fighting 방지를 위한 오프셋 설정 (겹친 면의 우선순위 조정)
              child.material.polygonOffset = true;
              child.material.polygonOffsetFactor = -1.0; // 음수 값으로 설정하여 앞쪽으로 약간 당김
              child.material.polygonOffsetUnits = -4.0;
              
              // 모아레 현상 방지: 텍스처가 있는 경우 이방성 필터링 적용
              const applyTextureSettings = (tex) => {
                if (tex) {
                  tex.anisotropy = maxAnisotropy;
                  tex.minFilter = THREE.LinearMipmapLinearFilter;
                  tex.magFilter = THREE.LinearFilter;
                  tex.needsUpdate = true;
                }
              };
              
              applyTextureSettings(child.material.map);
              applyTextureSettings(child.material.normalMap);
              applyTextureSettings(child.material.roughnessMap);
              applyTextureSettings(child.material.metalnessMap);
            }
          }
        });

        scene.add(gltf.scene);
        currentModel = gltf.scene;

        if (loadingText) loadingText.style.display = 'none';
        console.log('모델 로드 성공 (' + mode + ')');
      },
      undefined,
      function (e) {
        console.error('로드 중 에러:', e);
        if (loadingText) {
          loadingText.innerText = '파일 로드 실패. 콘솔을 확인하세요.';
        }
      }
    );
  }

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // 바닥 아래로 안 넘어가게 각도 제한 (지구본 위쪽만 보이도록)
  controls.minPolarAngle = 0.1;           // 정가운데(수평)보다 살짝 위부터
  controls.maxPolarAngle = Math.PI * 0.45; // 대략 80도 정도까지만 내려가게

  // 좌우 회전은 자유롭게
  controls.minAzimuthAngle = -Infinity;
  controls.maxAzimuthAngle = Infinity;

  // 줌 범위 제한 (바닥 안 뚫리게 너무 가까이 못 가게)
  controls.enableZoom = true;
  controls.minDistance = 3;   // 더 붙고 싶으면 2 정도로 줄이기
  controls.maxDistance = 30;  // 더 멀리 보고 싶으면 숫자 키우기

  // 패닝(우클릭 이동) 허용
  controls.enablePan = true;

  // 버튼 이벤트 연결
  const btnBuilding = document.getElementById('btn-3d-building');
  const btnReal = document.getElementById('btn-3d-real');

  if (btnBuilding) {
    btnBuilding.addEventListener('click', function () {
      setActiveButton('building');
      loadModel('building');
    });
  }

  if (btnReal) {
    btnReal.addEventListener('click', function () {
      setActiveButton('real');
      loadModel('real');
    });
  }

  // 초기 상태: 건물 보기
  setActiveButton('building');
  loadModel('building');

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // 리사이즈 시 뷰포트/카메라 갱신 (모바일 회전 등)
  window.addEventListener('resize', function() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    renderer.setSize(w, h);
    updateCameraFov();
  });
})();
</script>
